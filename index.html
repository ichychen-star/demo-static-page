<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小三年級社會課考卷</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>國小三年級社會課考卷</h1>
            <p>測試您的社會知識</p>
        </div>
    </header>

    <section id="quiz" class="hero">
        <div class="container">
            <h2>開始考試 🎉</h2>
            <p>請回答以下問題。每題選擇一個答案。加油哦！😊</p>
            <form id="quiz-form">
                <div class="question">
                    <h3>1. 台灣的首都是哪裡？🏙️</h3>
                    <label><input type="radio" name="q1" value="a"> a) 高雄</label><br>
                    <label><input type="radio" name="q1" value="b"> b) 台北</label><br>
                    <label><input type="radio" name="q1" value="c"> c) 台中</label>
                </div>
                <div class="question">
                    <h3>2. 台灣最大的島嶼是什麼？🏝️</h3>
                    <label><input type="radio" name="q2" value="a"> a) 台灣島</label><br>
                    <label><input type="radio" name="q2" value="b"> b) 澎湖島</label><br>
                    <label><input type="radio" name="q2" value="c"> c) 金門島</label>
                </div>
                <div class="question">
                    <h3>3. 台灣的國旗上有幾顆星星？⭐</h3>
                    <label><input type="radio" name="q3" value="a"> a) 3顆</label><br>
                    <label><input type="radio" name="q3" value="b"> b) 5顆</label><br>
                    <label><input type="radio" name="q3" value="c"> c) 7顆</label>
                </div>
                <div class="question">
                    <h3>4. 台灣的最高山是哪座？⛰️</h3>
                    <label><input type="radio" name="q4" value="a"> a) 玉山</label><br>
                    <label><input type="radio" name="q4" value="b"> b) 阿里山</label><br>
                    <label><input type="radio" name="q4" value="c"> c) 陽明山</label>
                </div>
                <div class="question">
                    <h3>5. 台灣的國花是什麼？🌸</h3>
                    <label><input type="radio" name="q5" value="a"> a) 梅花</label><br>
                    <label><input type="radio" name="q5" value="b"> b) 蓮花</label><br>
                    <label><input type="radio" name="q5" value="c"> c) 櫻花</label>
                </div>
                <button type="button" id="submit-btn">提交答案 🚀</button>
            </form>
            <div id="result" style="display: none;">
                <h3>您的成績 🎊</h3>
                <p id="score"></p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2023 國小社會課考卷. 祝您好運！</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
