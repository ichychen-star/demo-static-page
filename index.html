<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>台灣社會小測驗</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <span class="header-brand">台灣社會課</span>
    </div>
  </header>

  <div class="progress-rail" id="progress-rail">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <main>

    <!-- Hero -->
    <section class="section-hero" id="section-hero">
      <div class="hero-body">
        <p class="eyebrow">三年級 · 社會課</p>
        <h1 class="display-title">台灣<br>知識測驗</h1>
        <p class="display-sub">五道精選題目，測試你對台灣的了解。<br>輕鬆作答，立即知曉成績。</p>
        <button class="btn-cta" id="btn-start">開始測驗</button>
      </div>
    </section>

    <!-- Quiz -->
    <section class="section-quiz" id="section-quiz" hidden>
      <div class="quiz-inner">

        <div class="step-label" id="step-label">1 / 5</div>

        <div class="card-stage" id="card-stage">

          <div class="q-card active" id="q0">
            <h2 class="q-title">台灣的首都是哪裡？</h2>
            <div class="choices">
              <label class="choice"><input type="radio" name="q1" value="a"><span class="dot"></span><span>高雄</span></label>
              <label class="choice"><input type="radio" name="q1" value="b"><span class="dot"></span><span>台北</span></label>
              <label class="choice"><input type="radio" name="q1" value="c"><span class="dot"></span><span>台中</span></label>
            </div>
          </div>

          <div class="q-card" id="q1">
            <h2 class="q-title">台灣最大的島嶼是什麼？</h2>
            <div class="choices">
              <label class="choice"><input type="radio" name="q2" value="a"><span class="dot"></span><span>台灣島</span></label>
              <label class="choice"><input type="radio" name="q2" value="b"><span class="dot"></span><span>澎湖島</span></label>
              <label class="choice"><input type="radio" name="q2" value="c"><span class="dot"></span><span>金門島</span></label>
            </div>
          </div>

          <div class="q-card" id="q2">
            <h2 class="q-title">台灣的國慶日是幾月幾日？</h2>
            <div class="choices">
              <label class="choice"><input type="radio" name="q3" value="a"><span class="dot"></span><span>1 月 1 日</span></label>
              <label class="choice"><input type="radio" name="q3" value="b"><span class="dot"></span><span>10 月 10 日</span></label>
              <label class="choice"><input type="radio" name="q3" value="c"><span class="dot"></span><span>12 月 25 日</span></label>
            </div>
          </div>

          <div class="q-card" id="q3">
            <h2 class="q-title">台灣的最高山是哪座？</h2>
            <div class="choices">
              <label class="choice"><input type="radio" name="q4" value="a"><span class="dot"></span><span>玉山</span></label>
              <label class="choice"><input type="radio" name="q4" value="b"><span class="dot"></span><span>阿里山</span></label>
              <label class="choice"><input type="radio" name="q4" value="c"><span class="dot"></span><span>陽明山</span></label>
            </div>
          </div>

          <div class="q-card" id="q4">
            <h2 class="q-title">台灣的國花是什麼？</h2>
            <div class="choices">
              <label class="choice"><input type="radio" name="q5" value="a"><span class="dot"></span><span>梅花</span></label>
              <label class="choice"><input type="radio" name="q5" value="b"><span class="dot"></span><span>蓮花</span></label>
              <label class="choice"><input type="radio" name="q5" value="c"><span class="dot"></span><span>櫻花</span></label>
            </div>
          </div>

        </div>

        <div class="quiz-controls">
          <button class="btn-ghost" id="btn-prev">上一題</button>
          <button class="btn-cta"   id="btn-next">下一題</button>
        </div>

      </div>
    </section>

    <!-- Result -->
    <section class="section-result" id="section-result" hidden>
      <div class="result-inner">
        <div class="check-icon">
          <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
            <circle cx="28" cy="28" r="28" fill="#34c759" fill-opacity="0.1"/>
            <path d="M17 28l8 8 14-16" stroke="#34c759" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="eyebrow">測驗完成</p>
        <h2 class="result-headline" id="result-headline">—</h2>
        <p class="result-desc" id="result-desc"></p>
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 120 120">
            <circle class="ring-track" cx="60" cy="60" r="50"/>
            <circle class="ring-score" id="ring-score" cx="60" cy="60" r="50"/>
          </svg>
          <span class="ring-pct" id="ring-pct">0%</span>
        </div>
        <button class="btn-cta" id="btn-retry">再試一次</button>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>三年級社會課 · 台灣知識測驗</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
